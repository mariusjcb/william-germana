"Identify subjects and use nominative articles"},{id:"accusative-case",name:"Accusative Case",description:"Use accusative articles for direct objects"},{id:"sentence-structure",name:"Sentence Structure",description:"Master German word order and the V2 rule"},{id:"questions",name:"Yes/No & W-Questions",description:"Form questions in German"},{id:"negation",name:"Negation: nicht vs. kein",description:"Learn when to use nicht and when to use kein"},{id:"possessive-pronouns",name:"Possessive Pronouns",description:"Express ownership with mein, dein, sein, ihr, etc."},{id:"prepositions",name:"Prepositions & Conjunctions",description:"Use common prepositions and conjunctions correctly"}],Dm=[{id:"g001",topicId:"noun-gender",topicName:"Noun Gender & Articles",question:'What article does "Tisch" (table) use?',answer:"der Tisch (masculine)",explanation:"Tisch is masculine. Many single-syllable nouns referring to objects are masculine in German."},{id:"g002",topicId:"noun-gender",topicName:"Noun Gender & Articles",question:'What article does "Lampe" (lamp) use?',answer:"die Lampe (feminine)",explanation:"Nouns ending in -e are very often feminine. This is one of the most reliable gender rules."},{id:"g003",topicId:"noun-gender",topicName:"Noun Gender & Articles",question:'What article does "Buch" (book) use?',answer:"das Buch (neuter)",explanation:"Buch is neuter. There is no simple rule here — it must be memorized."},{id:"g004",topicId:"noun-gender",topicName:"Noun Gender & Articles",question:'What article does "Universität" (university) use?',answer:"die Universität (feminine)",explanation:'Nouns ending in -tät are always feminine, similar to English words ending in "-ty."'},{id:"g005",topicId:"noun-gender",topicName:"Noun Gender & Articles",question:'What article does "Mädchen" (girl) use?',answer:"das Mädchen (neuter)",explanation:"Nouns ending in -chen (diminutive suffix) are always neuter, regardless of the natural gender of the person."},{id:"g006",topicId:"noun-gender",topicName:"Noun Gender & Articles",question:'What article does "Freiheit" (freedom) use?',answer:"die Freiheit (feminine)",explanation:"Nouns ending in -heit are always feminine."},{id:"g007",topicId:"noun-gender",topicName:"Noun Gender & Articles",question:'What article does "Computer" (computer) use?',answer:"der Computer (masculine)",explanation:"Many English loanwords that refer to machines or tools are masculine in German."},{id:"g008",topicId:"noun-gender",topicName:"Noun Gender & Articles",question:'What article does "Zeitung" (newspaper) use?',answer:"die Zeitung (feminine)",explanation:"Nouns ending in -ung are always feminine."},{id:"g009",topicId:"noun-gender",topicName:"Noun Gender & Articles",question:'What article does "Gebäude" (building) use?',answer:"das Gebäude (neuter)",explanation:"Nouns with the prefix Ge- that refer to a collective concept are often neuter."},{id:"g010",topicId:"noun-gender",topicName:"Noun Gender & Articles",question:'What article does "Lehrerin" (female teacher) use?',answer:"die Lehrerin (feminine)",explanation:"Nouns ending in -in (denoting a female person) are always feminine."},{id:"g011",topicId:"noun-gender",topicName:"Noun Gender & Articles",question:'What article does "Käse" (cheese) use?',answer:"der Käse (masculine)",explanation:"Käse is one of the few masculine nouns ending in -e. Most -e nouns are feminine, but there are exceptions."},{id:"g012",topicId:"noun-gender",topicName:"Noun Gender & Articles",question:"What are the three definite articles in German?",answer:"der (masculine), die (feminine), das (neuter)",explanation:"Every German noun has a grammatical gender. The definite article must match the noun's gender."},{id:"g013",topicId:"indefinite-articles",topicName:"Indefinite & Negative Articles",question:"What is the indefinite article for a masculine noun (nominative)?",answer:"ein",explanation:'Masculine and neuter nouns share the indefinite article "ein" in the nominative case.'},{id:"g014",topicId:"indefinite-articles",topicName:"Indefinite & Negative Articles",question:"What is the indefinite article for a feminine noun (nominative)?",answer:"eine",explanation:'"Eine" is used for feminine nouns in the nominative and accusative cases.'},{id:"g015",topicId:"indefinite-articles",topicName:"Indefinite & Negative Articles",question:'How do you say "not a book" in German?',answer:"kein Buch",explanation:'"Kein" is the negative article. It replaces "ein" to negate a noun. Buch is neuter, so kein has no ending.'},{id:"g016",topicId:"indefinite-articles",topicName:"Indefinite & Negative Articles",question:'How do you say "not a woman" in German (nominative)?',answer:"keine Frau",explanation:'"Keine" is the feminine form of the negative article. It follows the same endings as "eine."'},{id:"g017",topicId:"indefinite-articles",topicName:"Indefinite & Negative Articles",question:'Translate: "I have a dog." (der Hund)',answer:"Ich habe einen Hund.",explanation:'"Hund" is masculine. After "haben" we need the accusative case, so "ein" becomes "einen."'},{id:"g018",topicId:"indefinite-articles",topicName:"Indefinite & Negative Articles",question:`Translate: "I don't have a car." (das Auto)`,answer:"Ich habe kein Auto.",explanation:'"Auto" is neuter. In the accusative case, neuter "kein" has no additional ending.'},{id:"g019",topicId:"indefinite-articles",topicName:"Indefinite & Negative Articles",question:'Translate: "That is a cat." (die Katze)',answer:"Das ist eine Katze.",explanation:'"Katze" is feminine. After "ist" we stay in the nominative case, so we use "eine."'},{id:"g020",topicId:"indefinite-articles",topicName:"Indefinite & Negative Articles",question:'How do you negate a plural noun with "kein"? E.g., "no children"',answer:"keine Kinder",explanation:'"Keine" is used for all plural nouns, regardless of the original gender of the singular form.'},{id:"g021",topicId:"indefinite-articles",topicName:"Indefinite & Negative Articles",question:'Does German have a plural form of "ein"?',answer:"No. There is no plural indefinite article in German.",explanation:'In the plural, the indefinite article is simply omitted: "Bücher" (books), not "eine Bücher." However, "keine" exists for the negative plural.'},{id:"g022",topicId:"indefinite-articles",topicName:"Indefinite & Negative Articles",question:`Fill in the blank: "Ich habe ___ Bruder." (I don't have a brother.)`,answer:"keinen",explanation:'"Bruder" is masculine. In the accusative case, "kein" takes the ending "-en" for masculine nouns: "keinen Bruder."'},{id:"g023",topicId:"plural-formation",topicName:"Plural Formation",question:'What is the plural of "das Kind" (child)?',answer:"die Kinder",explanation:'"Kind" adds -er to form its plural. All plural nouns use the article "die."'},{id:"g024",topicId:"plural-formation",topicName:"Plural Formation",question:'What is the plural of "die Frau" (woman)?',answer:"die Frauen",explanation:"Many feminine nouns add -en to form the plural."},{id:"g025",topicId:"plural-formation",topicName:"Plural Formation",question:'What is the plural of "der Tisch" (table)?',answer:"die Tische",explanation:"Many masculine nouns add -e to form the plural."},{id:"g026",topicId:"plural-formation",topicName:"Plural Formation",question:'What is the plural of "das Auto" (car)?',answer:"die Autos",explanation:"Many loanwords and words ending in a vowel add -s to form the plural."},{id:"g027",topicId:"plural-formation",topicName:"Plural Formation",question:'What is the plural of "der Apfel" (apple)?',answer:"die Äpfel",explanation:'"Apfel" gains an umlaut (a → ä) with no added ending. This is common for masculine nouns ending in -el.'},{id:"g028",topicId:"plural-formation",topicName:"Plural Formation",question:'What is the plural of "das Haus" (house)?',answer:"die Häuser",explanation:'"Haus" adds -er and gains an umlaut (a → ä). The -er plural often triggers an umlaut.'},{id:"g029",topicId:"plural-formation",topicName:"Plural Formation",question:'What is the plural of "die Blume" (flower)?',answer:"die Blumen",explanation:"Feminine nouns ending in -e typically add -n to form the plural."},{id:"g030",topicId:"plural-formation",topicName:"Plural Formation",question:'What is the plural of "der Stuhl" (chair)?',answer:"die Stühle",explanation:'"Stuhl" adds -e and gains an umlaut (u → ü).'},{id:"g031",topicId:"plural-formation",topicName:"Plural Formation",question:'What is the plural of "das Mädchen" (girl)?',answer:"die Mädchen",explanation:"Nouns ending in -chen or -lein (diminutives) do not change in the plural."},{id:"g032",topicId:"plural-formation",topicName:"Plural Formation",question:'What is the plural of "die Lehrerin" (female teacher)?',answer:"die Lehrerinnen",explanation:'Feminine nouns ending in -in double the "n" and add -en: -in → -innen.'},{id:"g033",topicId:"plural-formation",topicName:"Plural Formation",question:'What is the plural of "der Mann" (man)?',answer:"die Männer",explanation:'"Mann" adds -er and gains an umlaut (a → ä) to form the plural.'},{id:"g034",topicId:"plural-formation",topicName:"Plural Formation",question:"What definite article do ALL plural nouns use in the nominative?",answer:"die",explanation:'Regardless of the singular gender (der, die, das), all plural nouns use "die" in the nominative and accusative cases.'},{id:"g035",topicId:"personal-pronouns",topicName:"Personal Pronouns",question:'What is the German pronoun for "I"?',answer:"ich",explanation:'"Ich" is first person singular. Note: it is only capitalized at the beginning of a sentence.'},{id:"g036",topicId:"personal-pronouns",topicName:"Personal Pronouns",question:'What is the German pronoun for "you" (informal singular)?',answer:"du",explanation:'"Du" is used with friends, family, children, and people your age in casual settings.'},{id:"g037",topicId:"personal-pronouns",topicName:"Personal Pronouns",question:'What is the German pronoun for "he"?',answer:"er",explanation:'"Er" refers to masculine nouns and male persons.'},{id:"g038",topicId:"personal-pronouns",topicName:"Personal Pronouns",question:'What is the German pronoun for "she"?',answer:"sie",explanation:'"sie" (lowercase) means "she" (singular) or "they" (plural). Context and verb conjugation clarify the meaning.'},{id:"g039",topicId:"personal-pronouns",topicName:"Personal Pronouns",question:'What is the German pronoun for "it"?',answer:"es",explanation:'"Es" is used for neuter nouns. Remember: "das Mädchen" (girl) is referred to as "es" grammatically.'},{id:"g040",topicId:"personal-pronouns",topicName:"Personal Pronouns",question:'What is the German pronoun for "we"?',answer:"wir",explanation:'"Wir" is first person plural, equivalent to English "we."'},{id:"g041",topicId:"personal-pronouns",topicName:"Personal Pronouns",question:'What is the German pronoun for "you" (informal plural)?',answer:"ihr",explanation:'"Ihr" is used when addressing multiple people informally, like "you all" or "you guys."'},{id:"g042",topicId:"personal-pronouns",topicName:"Personal Pronouns",question:'What is the German pronoun for "you" (formal, singular or plural)?',answer:"Sie",explanation:'"Sie" (always capitalized) is used in formal situations — with strangers, in business, and with elders.'},{id:"g043",topicId:"personal-pronouns",topicName:"Personal Pronouns",question:'How do you distinguish "she," "they," and "you (formal)" in German? They all look like "sie/Sie."',answer:"Context and verb form: sie ist (she is), sie sind (they are), Sie sind (you are, formal).",explanation:'Formal "Sie" is always capitalized. "sie" (lowercase) means "she" with singular verb or "they" with plural verb.'},{id:"g044",topicId:"personal-pronouns",topicName:"Personal Pronouns",question:"List all German personal pronouns in order.",answer:"ich, du, er, sie, es, wir, ihr, sie, Sie",explanation:"These cover: I, you (informal sg.), he, she, it, we, you (informal pl.), they, you (formal)."},{id:"g045",topicId:"regular-verbs",topicName:"Present Tense — Regular Verbs",question:'Conjugate "machen" (to do/make) for "ich."',answer:"ich mache",explanation:'Regular verbs: remove -en from the infinitive to get the stem (mach-), then add -e for "ich."'},{id:"g046",topicId:"regular-verbs",topicName:"Present Tense — Regular Verbs",question:'Conjugate "spielen" (to play) for "du."',answer:"du spielst",explanation:'For "du," add -st to the stem: spiel- + -st = spielst.'},{id:"g047",topicId:"regular-verbs",topicName:"Present Tense — Regular Verbs",question:'Conjugate "lernen" (to learn) for "er/sie/es."',answer:"er/sie/es lernt",explanation:"For third person singular, add -t to the stem: lern- + -t = lernt."},{id:"g048",topicId:"regular-verbs",topicName:"Present Tense — Regular Verbs",question:'Conjugate "wohnen" (to live/reside) for "wir."',answer:"wir wohnen",explanation:'For "wir," the verb keeps the infinitive form: wohnen. (Same as the infinitive.)'},{id:"g049",topicId:"regular-verbs",topicName:"Present Tense — Regular Verbs",question:'Conjugate "kochen" (to cook) for "ihr."',answer:"ihr kocht",explanation:'For "ihr," add -t to the stem: koch- + -t = kocht.'},{id:"g050",topicId:"regular-verbs",topicName:"Present Tense — Regular Verbs",question:'Conjugate "trinken" (to drink) for "sie" (they).',answer:"sie trinken",explanation:'For "sie" (they) and "Sie" (formal), the verb keeps the infinitive form: trinken.'},{id:"g051",topicId:"regular-verbs",topicName:"Present Tense — Regular Verbs",question:"What are the regular present tense endings in order (ich, du, er, wir, ihr, sie)?",answer:"-e, -st, -t, -en, -t, -en",explanation:'These six endings are added to the verb stem. Note: "wir" and "sie/Sie" share -en; "er/sie/es" and "ihr" share -t.'},{id:"g052",topicId:"regular-verbs",topicName:"Present Tense — Regular Verbs",question:'Conjugate "arbeiten" (to work) for "du."',answer:"du arbeitest",explanation:"When the stem ends in -t or -d, an extra -e- is inserted for pronunciation: arbeit- + -est = arbeitest."},{id:"g053",topicId:"regular-verbs",topicName:"Present Tense — Regular Verbs",question:'Conjugate "arbeiten" (to work) for "er."',answer:"er arbeitet",explanation:"Stems ending in -t or -d add -et instead of just -t: arbeit- + -et = arbeitet."},{id:"g054",topicId:"regular-verbs",topicName:"Present Tense — Regular Verbs",question:'Conjugate "tanzen" (to dance) for "du."',answer:"du tanzt",explanation:'When the stem ends in -z, -s, or -ß, "du" just adds -t (not -st) because the sounds merge: tanz- + -t = tanzt.'},{id:"g055",topicId:"regular-verbs",topicName:"Present Tense — Regular Verbs",question:'Conjugate "kaufen" (to buy) for "Sie" (formal you).',answer:"Sie kaufen",explanation:'Formal "Sie" always uses the same form as the infinitive: kaufen.'},{id:"g056",topicId:"regular-verbs",topicName:"Present Tense — Regular Verbs",question:'Translate: "We play football." using "spielen" and "Fußball."',answer:"Wir spielen Fußball.",explanation:'"Wir" takes the infinitive form of the verb. Fußball is written with ß, not "ss."'},{id:"g057",topicId:"irregular-verbs",topicName:"Irregular Verbs: sein & haben",question:'Conjugate "sein" (to be) for "ich."',answer:"ich bin",explanation:'"Sein" is highly irregular. "Ich bin" — compare English "I am."'},{id:"g058",topicId:"irregular-verbs",topicName:"Irregular Verbs: sein & haben",question:'Conjugate "sein" for "du."',answer:"du bist",explanation:'"Du bist" — the stem changes completely from the infinitive "sein."'},{id:"g059",topicId:"irregular-verbs",topicName:"Irregular Verbs: sein & haben",question:'Conjugate "sein" for "er/sie/es."',answer:"er/sie/es ist",explanation:'"Ist" is the third person singular of "sein." Very commonly used.'},{id:"g060",topicId:"irregular-verbs",topicName:"Irregular Verbs: sein & haben",question:'Conjugate "sein" for "wir" and "sie" (they).',answer:"wir sind / sie sind",explanation:'Both "wir" and "sie/Sie" use "sind." This is the most common form of "sein."'},{id:"g061",topicId:"irregular-verbs",topicName:"Irregular Verbs: sein & haben",question:'Conjugate "sein" for "ihr."',answer:"ihr seid",explanation:'"Ihr seid" — unique form only used with "ihr."'},{id:"g062",topicId:"irregular-verbs",topicName:"Irregular Verbs: sein & haben",question:'Conjugate "haben" (to have) for "ich."',answer:"ich habe",explanation:'"Ich habe" — "haben" follows a mostly regular pattern for "ich."'},{id:"g063",topicId:"irregular-verbs",topicName:"Irregular Verbs: sein & haben",question:'Conjugate "haben" for "du."',answer:"du hast",explanation:'"Du hast" — the -b- drops from the stem. This is an irregular change.'},{id:"g064",topicId:"irregular-verbs",topicName:"Irregular Verbs: sein & haben",question:'Conjugate "haben" for "er/sie/es."',answer:"er/sie/es hat",explanation:'"Hat" — the -b- drops and no -e- is added. Compare regular: "er habt" would be wrong.'},{id:"g065",topicId:"irregular-verbs",topicName:"Irregular Verbs: sein & haben",question:'Conjugate "haben" for "wir," "sie" (they), and "Sie" (formal).',answer:"wir haben / sie haben / Sie haben",explanation:"These forms are the same as the infinitive, just like regular verbs."},{id:"g066",topicId:"irregular-verbs",topicName:"Irregular Verbs: sein & haben",question:'Conjugate "haben" for "ihr."',answer:"ihr habt",explanation:'"Ihr habt" follows the regular pattern with the ending -t added to the stem "hab-."'},{id:"g067",topicId:"separable-verbs",topicName:"Separable Verbs",question:"What is a separable verb in German?",answer:"A verb with a prefix that detaches and moves to the end of the clause in the present tense.",explanation:'Examples: anfangen (to begin), aufstehen (to get up). In a sentence, the prefix goes to the end: "Ich fange an."'},{id:"g068",topicId:"separable-verbs",topicName:"Separable Verbs",question:'Use "aufstehen" (to get up) in a sentence with "ich."',answer:"Ich stehe um 7 Uhr auf.",explanation:'The prefix "auf" separates and goes to the end. The verb "stehe" stays in position 2.'},{id:"g069",topicId:"separable-verbs",topicName:"Separable Verbs",question:'Use "anfangen" (to begin) in a sentence with "wir."',answer:"Wir fangen jetzt an.",explanation:'"An" separates and goes to the end. "Fangen" is conjugated as "fangen" for "wir."'},{id:"g070",topicId:"separable-verbs",topicName:"Separable Verbs",question:'Use "einkaufen" (to shop) in a sentence with "sie" (she).',answer:"Sie kauft im Supermarkt ein.",explanation:'"Ein" separates and goes to the end. "Kauft" stays in position 2.'},{id:"g071",topicId:"separable-verbs",topicName:"Separable Verbs",question:'Use "anrufen" (to call/phone) with "du."',answer:"Du rufst mich an.",explanation:'"An" separates to the end. "Rufst" is conjugated for "du."'},{id:"g072",topicId:"separable-verbs",topicName:"Separable Verbs",question:'Use "fernsehen" (to watch TV) with "er."',answer:"Er sieht gern fern.",explanation:'"Fern" goes to the end. "Sehen" is irregular: "er sieht." "Gern" means "gladly/likes to."'},{id:"g073",topicId:"separable-verbs",topicName:"Separable Verbs",question:"Name three common separable prefixes.",answer:"an-, auf-, ein-, aus-, mit-, zu-, ab-, vor-",explanation:"These prefixes are stressed (emphasized) when spoken. Stress on the prefix is a sign the verb is separable."},{id:"g074",topicId:"separable-verbs",topicName:"Separable Verbs",question:'Use "zurückkommen" (to come back) with "ihr."',answer:"Ihr kommt morgen zurück.",explanation:'"Zurück" separates to the end. "Kommt" is the conjugation for "ihr."'},{id:"g075",topicId:"separable-verbs",topicName:"Separable Verbs",question:'Use "mitkommen" (to come along) with "du" as a question.',answer:"Kommst du mit?",explanation:"In yes/no questions, the conjugated verb comes first, the subject second, and the prefix goes to the end."},{id:"g076",topicId:"separable-verbs",topicName:"Separable Verbs",question:"What happens to a separable verb when used with a modal verb?",answer:"The separable verb stays together as one word (infinitive) at the end of the sentence.",explanation:'Example: "Ich muss um 6 Uhr aufstehen." The modal verb "muss" is conjugated; "aufstehen" remains whole at the end.'},{id:"g077",topicId:"modal-verbs",topicName:"Modal Verbs",question:'What does "können" mean?',answer:"can / to be able to",explanation:'"Können" expresses ability or possibility: "Ich kann schwimmen." (I can swim.)'},{id:"g078",topicId:"modal-verbs",topicName:"Modal Verbs",question:'What does "müssen" mean?',answer:"must / to have to",explanation:'"Müssen" expresses necessity or obligation: "Ich muss arbeiten." (I must work.)'},{id:"g079",topicId:"modal-verbs",topicName:"Modal Verbs",question:'What does "wollen" mean?',answer:"to want (to)",explanation:'"Wollen" expresses a strong desire or intention: "Ich will Deutsch lernen." (I want to learn German.)'},{id:"g080",topicId:"modal-verbs",topicName:"Modal Verbs",question:'What does "dürfen" mean?',answer:"may / to be allowed to",explanation:'"Dürfen" expresses permission: "Darf ich fragen?" (May I ask?)'},{id:"g081",topicId:"modal-verbs",topicName:"Modal Verbs",question:'What does "sollen" mean?',answer:"should / to be supposed to",explanation:'"Sollen" expresses a suggestion or moral obligation: "Du sollst nicht lügen." (You should not lie.)'},{id:"g082",topicId:"modal-verbs",topicName:"Modal Verbs",question:'What does "möchten" mean?',answer:"would like to",explanation:'"Möchten" is a polite form used to express wishes: "Ich möchte einen Kaffee." (I would like a coffee.)'},{id:"g083",topicId:"modal-verbs",topicName:"Modal Verbs",question:'Conjugate "können" for ich, du, er.',answer:"ich kann, du kannst, er kann",explanation:'Modal verbs have a stem-vowel change in singular forms: ö → a. Note: "ich" and "er/sie/es" have no ending.'},{id:"g084",topicId:"modal-verbs",topicName:"Modal Verbs",question:'Conjugate "müssen" for ich, du, er.',answer:"ich muss, du musst, er muss",explanation:'Stem-vowel change: ü → u in singular forms. "Ich" and "er/sie/es" have no ending.'},{id:"g085",topicId:"modal-verbs",topicName:"Modal Verbs",question:"Where does the main verb go in a sentence with a modal verb?",answer:"At the end of the sentence, in infinitive form.",explanation:'Example: "Ich kann gut Deutsch sprechen." The modal "kann" is in position 2; the infinitive "sprechen" goes to the end.'},{id:"g086",topicId:"modal-verbs",topicName:"Modal Verbs",question:'Translate: "She wants to travel to Berlin."',answer:"Sie will nach Berlin reisen.",explanation:'"Will" is "wollen" conjugated for "sie." The infinitive "reisen" goes to the end.'},{id:"g087",topicId:"modal-verbs",topicName:"Modal Verbs",question:'Translate: "We have to go now."',answer:"Wir müssen jetzt gehen.",explanation:'"Müssen" is conjugated as "müssen" for "wir." "Gehen" (infinitive) goes to the end.'},{id:"g088",topicId:"modal-verbs",topicName:"Modal Verbs",question:'Conjugate "möchten" for ich, du, er, wir, ihr, sie.',answer:"ich möchte, du möchtest, er möchte, wir möchten, ihr möchtet, sie möchten",explanation:'"Möchten" is technically the subjunctive of "mögen." It follows a regular-looking pattern but with no stem-vowel change.'},{id:"g089",topicId:"nominative-case",topicName:"Nominative Case",question:"When is the nominative case used?",answer:"For the subject of a sentence (the one doing the action).",explanation:'The nominative answers the question "Wer?" (Who?) or "Was?" (What?) is performing the action.'},{id:"g090",topicId:"nominative-case",topicName:"Nominative Case",question:"What are the definite articles in the nominative case?",answer:"der (m.), die (f.), das (n.), die (pl.)",explanation:"These are the standard dictionary forms of the articles."},{id:"g091",topicId:"nominative-case",topicName:"Nominative Case",question:"What are the indefinite articles in the nominative case?",answer:"ein (m.), eine (f.), ein (n.)",explanation:'Masculine and neuter share the same form "ein" in the nominative.'},{id:"g092",topicId:"nominative-case",topicName:"Nominative Case",question:'Identify the subject: "Der Hund frisst den Knochen."',answer:"Der Hund (the dog)",explanation:'"Der Hund" is in the nominative case — it is the one performing the action (eating).'},{id:"g093",topicId:"nominative-case",topicName:"Nominative Case",question:"Which verbs trigger the nominative for BOTH the subject and the complement?",answer:"sein (to be), werden (to become), bleiben (to remain)",explanation:'Example: "Er ist ein guter Lehrer." Both "Er" and "ein guter Lehrer" are nominative.'},{id:"g094",topicId:"nominative-case",topicName:"Nominative Case",question:'Fill in: "___ Frau liest ein Buch." (The woman reads a book.)',answer:"Die Frau liest ein Buch.",explanation:'"Frau" is feminine and is the subject, so we use the nominative article "die."'},{id:"g095",topicId:"nominative-case",topicName:"Nominative Case",question:'Fill in: "___ Kind spielt im Garten." (The child plays in the garden.)',answer:"Das Kind spielt im Garten.",explanation:'"Kind" is neuter and is the subject, so we use the nominative article "das."'},{id:"g096",topicId:"nominative-case",topicName:"Nominative Case",question:'Fill in: "___ Kinder spielen im Park." (The children play in the park.)',answer:"Die Kinder spielen im Park.",explanation:'All plural nouns use "die" in the nominative, regardless of the gender of the singular noun.'},{id:"g097",topicId:"accusative-case",topicName:"Accusative Case",question:"When is the accusative case used?",answer:"For the direct object of a sentence — the thing or person receiving the action.",explanation:'The accusative answers the question "Wen?" (Whom?) or "Was?" (What?) is affected by the verb.'},{id:"g098",topicId:"accusative-case",topicName:"Accusative Case",question:"What are the definite articles in the accusative case?",answer:"den (m.), die (f.), das (n.), die (pl.)",explanation:"Only the masculine article changes: der → den. Feminine, neuter, and plural stay the same."},{id:"g099",topicId:"accusative-case",topicName:"Accusative Case",question:"What are the indefinite articles in the accusative case?",answer:"einen (m.), eine (f.), ein (n.)",explanation:"Only the masculine article changes: ein → einen. The others remain the same."},{id:"g100",topicId:"accusative-case",topicName:"Accusative Case",question:'Fill in: "Ich sehe ___ Mann." (I see the man.)',answer:"Ich sehe den Mann.",explanation:'"Mann" is masculine and is the direct object, so "der" changes to "den" in the accusative.'},{id:"g101",topicId:"accusative-case",topicName:"Accusative Case",question:'Fill in: "Er kauft ___ Buch." (He buys a book.)',answer:"Er kauft ein Buch.",explanation:'"Buch" is neuter. In the accusative, the neuter indefinite article stays "ein."'},{id:"g102",topicId:"accusative-case",topicName:"Accusative Case",question:'Fill in: "Wir haben ___ Katze." (We have no cat.)',answer:"Wir haben keine Katze.",explanation:'"Katze" is feminine. In the accusative, the feminine "keine" stays the same as in the nominative.'},{id:"g103",topicId:"accusative-case",topicName:"Accusative Case",question:"Name three common verbs that take an accusative object.",answer:"haben (to have), sehen (to see), kaufen (to buy), trinken (to drink), essen (to eat)",explanation:"Most transitive verbs (verbs that take a direct object) use the accusative case."},{id:"g104",topicId:"accusative-case",topicName:"Accusative Case",question:'What happens to "er" (he) in the accusative case?',answer:"er → ihn",explanation:'Personal pronouns change in the accusative. "Ich sehe ihn." (I see him.)'},{id:"g105",topicId:"accusative-case",topicName:"Accusative Case",question:"What are the accusative personal pronouns for ich, du, er, sie (she), es?",answer:"mich, dich, ihn, sie, es",explanation:'"Ich" → "mich," "du" → "dich," "er" → "ihn." "Sie" and "es" stay the same.'},{id:"g106",topicId:"accusative-case",topicName:"Accusative Case",question:'Fill in: "Sie liebt ___ Hund." (She loves the dog.)',answer:"Sie liebt den Hund.",explanation:'"Hund" is masculine and is the direct object. Masculine "der" becomes "den" in the accusative.'},{id:"g107",topicId:"sentence-structure",topicName:"Sentence Structure",question:"What is the V2 (verb-second) rule in German?",answer:"In main clauses, the conjugated verb must always be in the second position.",explanation:`Example: "Ich spiele Fußball." / "Heute spiele ich Fußball." The verb is always second, even if the subject isn't first.`},{id:"g108",topicId:"sentence-structure",topicName:"Sentence Structure",question:'Reorder: "gehe / ich / morgen / ins Kino"',answer:"Ich gehe morgen ins Kino. (or: Morgen gehe ich ins Kino.)",explanation:"Both are correct. If a time expression comes first, the subject moves after the verb to keep V2."},{id:"g109",topicId:"sentence-structure",topicName:"Sentence Structure",question:"What is the basic word order for a German statement?",answer:"Subject – Verb – Object (SVO), but with V2 flexibility.",explanation:"The verb is always second. Other elements (time, manner, place) can occupy position 1, pushing the subject after the verb."},{id:"g110",topicId:"sentence-structure",topicName:"Sentence Structure",question:"What is the TMP rule?",answer:"Time – Manner – Place: the order of adverbial information in a German sentence.",explanation:'Example: "Ich fahre morgen (T) schnell (M) nach Berlin (P)."'},{id:"g111",topicId:"sentence-structure",topicName:"Sentence Structure",question:"Where does the second verb go in a sentence with a modal verb?",answer:"At the very end, in infinitive form.",explanation:'Example: "Ich muss heute Abend arbeiten." The modal "muss" is in position 2; "arbeiten" is at the end.'},{id:"g112",topicId:"sentence-structure",topicName:"Sentence Structure",question:'Fix the word order: "Heute ich gehe in die Schule."',answer:"Heute gehe ich in die Schule.",explanation:"When a non-subject element starts the sentence, the verb stays in position 2 and the subject moves to position 3."},{id:"g113",topicId:"sentence-structure",topicName:"Sentence Structure",question:'Fix the word order: "Er nach Hause geht."',answer:"Er geht nach Hause.",explanation:'The conjugated verb must be in position 2 in a statement. "Geht" should come right after "Er."'},{id:"g114",topicId:"sentence-structure",topicName:"Sentence Structure",question:'Where does "nicht" usually go in a sentence?',answer:"Before the element being negated, or at the end if negating the whole sentence.",explanation:'General negation: "Ich komme heute nicht." Specific negation: "Ich komme nicht heute (, sondern morgen)."'},{id:"g115",topicId:"sentence-structure",topicName:"Sentence Structure",question:'What happens to word order in a subordinate clause (e.g., with "weil")?',answer:"The conjugated verb goes to the very end of the subordinate clause.",explanation:'Example: "Ich bleibe zu Hause, weil ich krank bin." The verb "bin" moves to the end after "weil."'},{id:"g116",topicId:"sentence-structure",topicName:"Sentence Structure",question:'Combine: "Ich lerne Deutsch." + "Es macht Spaß." using "weil."',answer:"Ich lerne Deutsch, weil es Spaß macht.",explanation:'In the "weil" clause, the conjugated verb "macht" goes to the end.'},{id:"g117",topicId:"questions",topicName:"Yes/No & W-Questions",question:"How do you form a yes/no question in German?",answer:"Put the conjugated verb in position 1 (before the subject).",explanation:'Statement: "Du spielst Tennis." → Question: "Spielst du Tennis?"'},{id:"g118",topicId:"questions",topicName:"Yes/No & W-Questions",question:'Turn into a yes/no question: "Er kommt morgen."',answer:"Kommt er morgen?",explanation:'Move the verb "kommt" to position 1, then the subject "er" follows.'},{id:"g119",topicId:"questions",topicName:"Yes/No & W-Questions",question:'What does "Wer" mean, and how is it used?',answer:'"Wer" means "Who" and asks about a person (subject).',explanation:'Example: "Wer ist das?" (Who is that?) "Wer" takes nominative case.'},{id:"g120",topicId:"questions",topicName:"Yes/No & W-Questions",question:'What does "Was" mean, and how is it used?',answer:'"Was" means "What" and asks about things.',explanation:'Example: "Was machst du?" (What are you doing?)'},{id:"g121",topicId:"questions",topicName:"Yes/No & W-Questions",question:'What does "Wo" mean, and how is it used?',answer:'"Wo" means "Where" and asks about location.',explanation:'Example: "Wo wohnst du?" (Where do you live?) Compare: "Wohin" = "Where to."'},{id:"g122",topicId:"questions",topicName:"Yes/No & W-Questions",question:'What does "Wann" mean?',answer:'"Wann" means "When."',explanation:'Example: "Wann kommst du?" (When are you coming?)'},{id:"g123",topicId:"questions",topicName:"Yes/No & W-Questions",question:'What does "Warum" mean?',answer:'"Warum" means "Why."',explanation:'Example: "Warum lernst du Deutsch?" (Why are you learning German?)'},{id:"g124",topicId:"questions",topicName:"Yes/No & W-Questions",question:'What does "Wie" mean?',answer:'"Wie" means "How."',explanation:'"Wie heißt du?" (What is your name? — literally: How are you called?) "Wie viel" = How much.'},{id:"g125",topicId:"questions",topicName:"Yes/No & W-Questions",question:"What is the word order for a W-question?",answer:"W-word – Verb – Subject – rest of sentence.",explanation:'Example: "Woher kommst du?" (Where do you come from?) The verb is always in position 2.'},{id:"g126",topicId:"questions",topicName:"Yes/No & W-Questions",question:'Translate: "How old are you?" (informal)',answer:"Wie alt bist du?",explanation:'"Wie alt" (how old) is the W-phrase, "bist" is in position 2, "du" follows.'},{id:"g127",topicId:"negation",topicName:"Negation: nicht vs. kein",question:'When do you use "nicht"?',answer:"To negate verbs, adjectives, adverbs, and specific nouns (with a definite article or proper noun).",explanation:`"Nicht" works like English "not": "Ich komme nicht." (I'm not coming.) "Das ist nicht mein Buch." (That is not my book.)`},{id:"g128",topicId:"negation",topicName:"Negation: nicht vs. kein",question:'When do you use "kein"?',answer:'To negate nouns that would use "ein" or no article (indefinite or zero article nouns).',explanation:'"Ich habe ein Auto." → "Ich habe kein Auto." "Kein" replaces "ein" and means "not a / no."'},{id:"g129",topicId:"negation",topicName:"Negation: nicht vs. kein",question:'Negate: "Ich trinke Kaffee."',answer:"Ich trinke keinen Kaffee.",explanation:'"Kaffee" has no article (zero article), so use "kein." Masculine accusative: "keinen."'},{id:"g130",topicId:"negation",topicName:"Negation: nicht vs. kein",question:'Negate: "Das Buch ist interessant."',answer:"Das Buch ist nicht interessant.",explanation:'We are negating the adjective "interessant," so we use "nicht" (placed before the adjective).'},{id:"g131",topicId:"negation",topicName:"Negation: nicht vs. kein",question:'Negate: "Ich habe Geschwister." (I have siblings.)',answer:"Ich habe keine Geschwister.",explanation:'"Geschwister" is plural with no article. Use "keine" (plural form of "kein").'},{id:"g132",topicId:"negation",topicName:"Negation: nicht vs. kein",question:'Negate: "Er geht in die Schule."',answer:"Er geht nicht in die Schule.",explanation:'"Die Schule" has a definite article, so use "nicht." Place it before the prepositional phrase.'},{id:"g133",topicId:"negation",topicName:"Negation: nicht vs. kein",question:'Negate: "Sie ist Lehrerin." (She is a teacher.)',answer:"Sie ist keine Lehrerin.",explanation:'Professions without an article use "kein": "keine Lehrerin." (In German, professions often omit the article.)'},{id:"g134",topicId:"negation",topicName:"Negation: nicht vs. kein",question:'Negate: "Ich kenne den Mann." (I know the man.)',answer:"Ich kenne den Mann nicht.",explanation:'"Den Mann" has a definite article, so use "nicht." It typically goes at the end when negating the whole sentence.'},{id:"g135",topicId:"possessive-pronouns",topicName:"Possessive Pronouns",question:'What is the possessive pronoun for "ich"?',answer:"mein (my)",explanation:'"Mein" takes the same endings as "ein/kein": mein Hund (m.), meine Katze (f.), mein Buch (n.).'},{id:"g136",topicId:"possessive-pronouns",topicName:"Possessive Pronouns",question:'What is the possessive pronoun for "du"?',answer:"dein (your, informal singular)",explanation:'"Dein" follows the same pattern: dein Vater, deine Mutter, dein Kind.'},{id:"g137",topicId:"possessive-pronouns",topicName:"Possessive Pronouns",question:'What is the possessive pronoun for "er" and "es"?',answer:"sein (his / its)",explanation:'"Sein" is used for masculine and neuter owners: "sein Buch" (his book).'},{id:"g138",topicId:"possessive-pronouns",topicName:"Possessive Pronouns",question:'What is the possessive pronoun for "sie" (she)?',answer:"ihr (her)",explanation:`"Ihr" (lowercase) means "her": "ihr Buch" (her book). Don't confuse with "Ihr" (formal your) or "ihr" (you all).`},{id:"g139",topicId:"possessive-pronouns",topicName:"Possessive Pronouns",question:'What is the possessive pronoun for "wir"?',answer:"unser (our)",explanation:'"Unser" follows ein-word endings: unser Haus (n.), unsere Schule (f.), unseren Lehrer (m. acc.).'},{id:"g140",topicId:"possessive-pronouns",topicName:"Possessive Pronouns",question:'What is the possessive pronoun for "ihr" (you all)?',answer:"euer (your, informal plural)",explanation:'Note: "euer" drops the -e- before endings: "eure Mutter" (not "euere").'},{id:"g141",topicId:"possessive-pronouns",topicName:"Possessive Pronouns",question:'What is the possessive pronoun for "sie" (they) and "Sie" (formal)?',answer:"ihr (their) / Ihr (your, formal)",explanation:'"Ihr Buch" (formal: your book) is capitalized. "ihr Buch" (their book) is lowercase.'},{id:"g142",topicId:"possessive-pronouns",topicName:"Possessive Pronouns",question:'Translate: "my mother" (die Mutter)',answer:"meine Mutter",explanation:'"Mutter" is feminine, so "mein" takes the feminine ending -e: "meine."'},{id:"g143",topicId:"possessive-pronouns",topicName:"Possessive Pronouns",question:'Translate: "his children" (die Kinder)',answer:"seine Kinder",explanation:'Plural possessives take the -e ending: "seine Kinder." This is the same ending as for feminine nouns.'},{id:"g144",topicId:"possessive-pronouns",topicName:"Possessive Pronouns",question:'Fill in: "Ich liebe ___ Bruder." (I love my brother.) — accusative',answer:"Ich liebe meinen Bruder.",explanation:'"Bruder" is masculine. In the accusative, "mein" becomes "meinen" (just like ein → einen).'},{id:"g145",topicId:"prepositions",topicName:"Prepositions & Conjunctions",question:'Which case does "mit" (with) require?',answer:"Dative",explanation:'"Mit" always takes the dative case: "mit dem Auto" (with the car), "mit der Bahn" (by train).'},{id:"g146",topicId:"prepositions",topicName:"Prepositions & Conjunctions",question:'Which case does "für" (for) require?',answer:"Accusative",explanation:'"Für" always takes the accusative: "für den Mann" (for the man), "für eine Freundin" (for a friend).'},{id:"g147",topicId:"prepositions",topicName:"Prepositions & Conjunctions",question:'Translate: "I go to school." using "in."',answer:"Ich gehe in die Schule.",explanation:'"In" + accusative indicates movement toward a destination. "Die Schule" stays "die" in the accusative (feminine).'},{id:"g148",topicId:"prepositions",topicName:"Prepositions & Conjunctions",question:'Translate: "The book is on the table." using "auf."',answer:"Das Buch liegt auf dem Tisch.",explanation:'"Auf" + dative indicates location (no movement). "Der Tisch" becomes "dem Tisch" in the dative.'},{id:"g149",topicId:"prepositions",topicName:"Prepositions & Conjunctions",question:'Translate: "I am going to Berlin." using "nach."',answer:"Ich fahre nach Berlin.",explanation:'"Nach" is used with cities, countries (without articles), and directions: "nach Hause" (homeward).'},{id:"g150",topicId:"prepositions",topicName:"Prepositions & Conjunctions",question:'Translate: "I go to the doctor." using "zu."',answer:"Ich gehe zum Arzt.",explanation:'"Zu" + dative is used for going to a person or place. "Zum" = "zu dem." "Arzt" is masculine.'},{id:"g151",topicId:"prepositions",topicName:"Prepositions & Conjunctions",question:"What are the three basic coordinating conjunctions in German?",answer:"und (and), oder (or), aber (but)",explanation:'Coordinating conjunctions do NOT change the word order: "Ich lerne und er arbeitet."'},{id:"g152",topicId:"prepositions",topicName:"Prepositions & Conjunctions",question:"Do coordinating conjunctions (und, oder, aber) change word order?",answer:"No. The word order after a coordinating conjunction stays normal (subject-verb).",explanation:'Example: "Ich lese, aber er schläft." Both clauses keep standard subject-verb order.'},{id:"g153",topicId:"prepositions",topicName:"Prepositions & Conjunctions",question:'Translate: "I stay at home because I am sick." using "denn."',answer:"Ich bleibe zu Hause, denn ich bin krank.",explanation:'"Denn" (because) is a coordinating conjunction — the word order does not change after it.'},{id:"g154",topicId:"prepositions",topicName:"Prepositions & Conjunctions",question:'What is the difference between "in dem" and "im"?',answer:'"Im" is the contraction of "in dem" (in the, dative masculine/neuter).',explanation:"Common contractions: in + dem = im, an + dem = am, zu + dem = zum, zu + der = zur."}];function nS({onSelectTopic:r}){const[u,c]=D.useState(new Map);return D.useEffect(()=>{(async()=>{const s=await Yi(),f=new Map(s.map(v=>[v.cardId,v])),h=new Map;for(const v of ts){const O=Dm.filter(g=>g.topicId===v.id),m=O.filter(g=>pm(f.get(g.id))).length;h.set(v.id,{mastered:m,total:O.length})}c(h)})()},[]),b.jsxs("div",{className:"py-6",children:[b.jsx("h1",{className:"text-2xl font-bold text-text-primary mb-6",children:"Grammar Topics"}),b.jsx("div",{className:"space-y-3",children:ts.map(s=>{const f=u.get(s.id),h=f?.mastered??0,v=f?.total??0,O=v>0?h/v*100:0,m=h===v&&v>0;return b.jsxs("button",{onClick:()=>r(s.id),className:"w-full bg-surface rounded-xl p-4 shadow-sm border border-gray-100 hover:border-primary/30 transition-colors text-left flex items-center gap-3",c
